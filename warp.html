<!doctype html><html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>愛紗·暗夜城 — 跳關</title>
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  body{margin:0;background:#0c0a12;color:#e9e3f5;font-family:system-ui,"Noto Sans TC",sans-serif;padding:16px 14px 60px}
  h1{font-size:20px;margin:6px 0 2px;color:#d9b3ff}
  .sub{color:#8a82a0;font-size:13px;margin-bottom:14px;line-height:1.5}
  .sub b{color:#ffb3d9}
  h2{font-size:14px;color:#ffb3d9;border-left:3px solid #c9a6ff;padding-left:8px;margin:22px 0 10px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
  a.warp{display:block;text-decoration:none;background:#191428;border:1px solid #2e2747;border-radius:11px;
    padding:11px 12px;color:#e9e3f5;transition:.12s}
  a.warp:active{background:#241c3c}
  a.warp .id{font-size:12px;color:#9a7bd6;font-weight:700}
  a.warp .nm{font-size:15px;margin-top:2px}
  a.warp .tag{font-size:11px;color:#8a82a0;margin-top:3px}
  a.boss{border-color:#7a2540;background:#241420}
  a.boss .id{color:#ff7aa8}
  a.safe{border-color:#2a5a4a;background:#142420}
  a.safe .id{color:#6fe0b8}
  .dbg a{display:inline-block;margin:4px 8px 4px 0;font-size:13px;color:#c9a6ff}
</style></head><body>
<h1>🗡️ 愛紗·暗夜城 — 跳關選單</h1>
<div class="sub">點任一關直接進。<b>手機請用無痕視窗</b>開(否則載到舊版)。👑=區王房 🛡️=安全屋(存檔+商店)。</div>

<h2>Z1 城門前庭</h2>
<div class="grid" id="z1"></div>
<h2>Z2 大廳迴廊</h2>
<div class="grid" id="z2"></div>
<h2>Z3 地下牢獄（新）</h2>
<div class="grid" id="z3"></div>

<h2>除錯工具</h2>
<div class="dbg">
  <a href="./?show=enemies">👾 全敵人並排（含騎士）</a>
  <a href="./?show=enemies&atkpose">👾 全敵人攻擊姿勢</a>
  <a href="./">🏠 正常開始（從存檔/第一關）</a>
</div>

<script>
const ROOMS=[
 ["R1","城門入口","⚔️ 戰鬥",1,""],["R2","吊橋","🧗 平台",1,""],["R3","守衛庭院","⚔️ 戰鬥",1,""],
 ["R4","軍械庫","💎 寶箱",1,""],["R5","外牆迴廊","🧗 平台",1,""],["R6","哨塔","🛡️ 安全屋",1,"safe"],
 ["R7","城門守衛","👑 Z1 區王",1,"boss"],
 ["R8","大廳入口","⚔️ 戰鬥",2,""],["R9","燭光長廊","🕯️ 機關",2,""],["R10","宴會廳","⚔️ 戰鬥",2,""],
 ["R11","畫廊密室","💎 寶箱",2,""],["R12","旋轉樓梯","🧗 平台",2,""],["R13","騎士休息室","🛡️ 安全屋",2,"safe"],
 ["R14","騎士隊長","👑 Z2 區王",2,"boss"],
 ["R15","階梯下行","🧗 平台",3,""],["R16","牢房走道","⚔️ 戰鬥",3,""],["R17","拷問室","⚔️ 戰鬥",3,""],
 ["R18","廢棄牢","💀 小王",3,"boss"],["R19","暗渠","💎 寶箱",3,""],["R20","看守室","🛡️ 安全屋",3,"safe"],
 ["R21","巨型獄卒","👑 Z3 區王",3,"boss"],
];
const cb=Date.now();
for(const [id,nm,tag,z,cls] of ROOMS){
  const a=document.createElement('a');
  a.className='warp '+cls; a.href=`./?room=${id}&cb=${cb}`;
  a.innerHTML=`<div class="id">${id}</div><div class="nm">${nm}</div><div class="tag">${tag}</div>`;
  document.getElementById('z'+z).appendChild(a);
}
</script>
</body></html>
